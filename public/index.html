<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- PWA / theme -->
    <meta name="theme-color" content="#7c3aed" />
    <meta name="background-color" content="#030712" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MusicApp" />

    <!-- SEO / description -->
    <meta name="description"
          content="Search and stream full Spotify tracks. Create playlists, pin favourites. Requires Spotify Premium." />
    <meta name="application-name" content="MusicApp" />

    <!-- Icons -->
    <link rel="icon" href="%PUBLIC_URL%/icons/icon-96.png" type="image/png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="%PUBLIC_URL%/icons/icon-192.png" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>MusicApp</title>

    <!-- Spotify Web Playback SDK -->
    <script>
      window.onSpotifyWebPlaybackSDKReady = function () {
        window._spotifySDKReady = true;
      };
    </script>
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
